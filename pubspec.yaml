name: tyre_ms
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_messaging: ^15.1.0
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.2.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1
  intl: ^0.20.2
  http: ^1.2.2
  googleapis_auth: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# KONFIGURASI ICON
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_tms.png"
  min_sdk_android: 21

# KONFIGURASI FLUTTER
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_tms.png
    - assets/images/icon_tms.png